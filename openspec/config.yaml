schema: spec-driven

context: |
  Tech stack: OpenCode configuration repository with ESM TypeScript/TSX, nested npm-based TUI plugin packages, and package-lock-managed dependencies.
  Architecture: Agent- and MCP-oriented config at the root; `tui-plugins/{cache,limits,quota,mrjmpl3-subagent-status}` are small Solid/TSX plugin packages split into pure helpers plus TUI entrypoints.
  Testing: Vitest unit tests exist in all four TUI plugin packages with matching `test` and `typecheck` scripts; no integration, E2E, or coverage suite was detected.
  Style: 2-space indentation, LF endings, final newline, a root Prettier config, and a root .editorconfig; no repo lint config was detected.
  Note: This repo is operational/configuration code for OpenCode, not a product application.

strict_tdd: true

testing:
  runner:
    name: vitest
    command: vitest run
    packages:
      - tui-plugins/cache
      - tui-plugins/limits
      - tui-plugins/quota
      - tui-plugins/mrjmpl3-subagent-status
  layers:
    unit: true
    integration: false
    e2e: false
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: false
      command: null
    type_checker:
      available: true
      command: tsc --noEmit -p tsconfig.json
      packages:
        - tui-plugins/cache
        - tui-plugins/limits
        - tui-plugins/quota
        - tui-plugins/mrjmpl3-subagent-status
    formatter:
      available: false
      command: null
      config: prettier.config.mjs

rules:
  proposal:
    - Include a rollback plan for risky changes.
  specs:
    - Use Given/When/Then for scenarios.
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY).
  design:
    - Document architecture decisions and rationale.
    - Add diagrams for multi-step flows when helpful.
  tasks:
    - Group tasks by phase and keep them completable in one session.
  apply:
    - Follow existing code patterns.
    - If strict_tdd is true, write tests before implementation.
  verify:
    - Run the relevant package-local Vitest and TypeScript checks.
    - Capture actual command output for evidence.
  archive:
    - Warn before merging destructive deltas.
